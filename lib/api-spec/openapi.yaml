openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kurdish link-in-bio platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profile
    description: User profile operations
  - name: pages
    description: Link in bio page operations
  - name: blocks
    description: Page block operations
  - name: links
    description: Link operations
  - name: analytics
    description: Analytics operations
  - name: public
    description: Public profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/check-username/{username}:
    get:
      operationId: checkUsername
      tags: [auth]
      summary: Check if username is available
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsernameCheckResult"

  /profile:
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile/social-links:
    put:
      operationId: updateSocialLinks
      tags: [profile]
      summary: Update social links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialLinksInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages:
    get:
      operationId: getPages
      tags: [pages]
      summary: Get current user pages
      responses:
        "200":
          description: Pages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Page"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPage
      tags: [pages]
      summary: Create a page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageInput"
      responses:
        "201":
          description: Created page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages/{id}:
    put:
      operationId: updatePage
      tags: [pages]
      summary: Update a page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageUpdate"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePage
      tags: [pages]
      summary: Delete a page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages/{pageId}/blocks:
    get:
      operationId: getBlocks
      tags: [blocks]
      summary: Get blocks for a page
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blocks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createBlock
      tags: [blocks]
      summary: Create a block on a page
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockInput"
      responses:
        "201":
          description: Created block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blocks/{id}:
    put:
      operationId: updateBlock
      tags: [blocks]
      summary: Update a block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockUpdate"
      responses:
        "200":
          description: Updated block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBlock
      tags: [blocks]
      summary: Delete a block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blocks/reorder:
    put:
      operationId: reorderBlocks
      tags: [blocks]
      summary: Reorder blocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /links:
    get:
      operationId: getLinks
      tags: [links]
      summary: Get links for a block
      parameters:
        - name: blockId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Links list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Link"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createLink
      tags: [links]
      summary: Create a link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "201":
          description: Created link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /links/{id}:
    put:
      operationId: updateLink
      tags: [links]
      summary: Update a link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkUpdate"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLink
      tags: [links]
      summary: Delete a link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics:
    get:
      operationId: getAnalytics
      tags: [analytics]
      summary: Get analytics for current user
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/click:
    post:
      operationId: recordClick
      tags: [analytics]
      summary: Record a link click
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClickInput"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /public/{username}:
    get:
      operationId: getPublicProfile
      tags: [public]
      summary: Get public profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterInput:
      type: object
      required: [username, email, password, name]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, email, name, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        themeColor:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        instagram:
          type: ["string", "null"]
        tiktok:
          type: ["string", "null"]
        youtube:
          type: ["string", "null"]
        snapchat:
          type: ["string", "null"]
        twitter:
          type: ["string", "null"]
        linkedin:
          type: ["string", "null"]
        twitch:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UsernameCheckResult:
      type: object
      required: [available, username]
      properties:
        available:
          type: boolean
        username:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        themeColor:
          type: string
        categories:
          type: array
          items:
            type: string

    SocialLinksInput:
      type: object
      properties:
        instagram:
          type: ["string", "null"]
        tiktok:
          type: ["string", "null"]
        youtube:
          type: ["string", "null"]
        snapchat:
          type: ["string", "null"]
        twitter:
          type: ["string", "null"]
        linkedin:
          type: ["string", "null"]
        twitch:
          type: ["string", "null"]

    Page:
      type: object
      required: [id, userId, title, isHome, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        isHome:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PageInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    PageUpdate:
      type: object
      properties:
        title:
          type: string

    Block:
      type: object
      required: [id, pageId, type, title, blockOrder, isVisible, createdAt]
      properties:
        id:
          type: integer
        pageId:
          type: integer
        type:
          type: string
          enum: [header, links, follower_count, contact_form, digital_products, text]
        title:
          type: string
        content:
          type: ["string", "null"]
        blockOrder:
          type: integer
        isVisible:
          type: boolean
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
        createdAt:
          type: string
          format: date-time

    BlockInput:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [header, links, follower_count, contact_form, digital_products, text]
        title:
          type: string
        content:
          type: string
        isVisible:
          type: boolean

    BlockUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        isVisible:
          type: boolean

    ReorderInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, blockOrder]
            properties:
              id:
                type: integer
              blockOrder:
                type: integer

    Link:
      type: object
      required: [id, blockId, title, url, linkOrder, createdAt]
      properties:
        id:
          type: integer
        blockId:
          type: integer
        title:
          type: string
        url:
          type: string
        icon:
          type: ["string", "null"]
        linkOrder:
          type: integer
        clickCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    LinkInput:
      type: object
      required: [blockId, title, url]
      properties:
        blockId:
          type: integer
        title:
          type: string
        url:
          type: string
        icon:
          type: string

    LinkUpdate:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        icon:
          type: string
        linkOrder:
          type: integer

    ClickInput:
      type: object
      required: [linkId]
      properties:
        linkId:
          type: integer
        username:
          type: string

    Analytics:
      type: object
      required: [totalClicks, totalLinks, clicksByDay, topLinks]
      properties:
        totalClicks:
          type: integer
        totalLinks:
          type: integer
        totalPageViews:
          type: integer
        clicksByDay:
          type: array
          items:
            type: object
            required: [date, clicks]
            properties:
              date:
                type: string
              clicks:
                type: integer
        topLinks:
          type: array
          items:
            type: object
            required: [linkId, title, url, clicks]
            properties:
              linkId:
                type: integer
              title:
                type: string
              url:
                type: string
              clicks:
                type: integer

    DashboardStats:
      type: object
      required: [totalClicks, totalLinks, totalPages, recentClicks]
      properties:
        totalClicks:
          type: integer
        totalLinks:
          type: integer
        totalPages:
          type: integer
        recentClicks:
          type: integer
        profileViews:
          type: integer

    PublicProfile:
      type: object
      required: [username, name, pages]
      properties:
        username:
          type: string
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        themeColor:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        tiktok:
          type: ["string", "null"]
        youtube:
          type: ["string", "null"]
        snapchat:
          type: ["string", "null"]
        twitter:
          type: ["string", "null"]
        linkedin:
          type: ["string", "null"]
        twitch:
          type: ["string", "null"]
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Page"
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/Block"
